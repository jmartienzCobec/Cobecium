# Netlify configuration for Cobecium web app (Vite + React SPA)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: serve index.html for all routes so client-side routing works
# (direct visits and refreshes to /analytics, /system-prompts, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
