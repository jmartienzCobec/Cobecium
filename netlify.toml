# Netlify configuration for Cobecium web app (Vite + React SPA)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Allow these in repo/build so secrets scan doesn't fail: publishable key (public), JWT issuer domain (URL, not a signing secret).
  SECRETS_SCAN_OMIT_KEYS = "VITE_CLERK_PUBLISHABLE_KEY,CLERK_JWT_ISSUER_DOMAIN"

# SPA: serve index.html for all routes so client-side routing works
# (direct visits and refreshes to /analytics, /system-prompts, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
