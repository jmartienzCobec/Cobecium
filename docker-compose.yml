# Cobecium dev stack: Convex (backend + dashboard) + web app.
# Tailscale: use .env.local with cobec-spark (or your hostname), then:
#   docker compose --env-file .env.local up --build
# App: http://cobec-spark:9560   Dashboard: http://cobec-spark:6791

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex_data:/convex/data
    environment:
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL:-http://127.0.0.1:3210}
    depends_on:
      backend:
        condition: service_healthy

  app:
    build: .
    ports:
      - "9560:9560"
    env_file:
      - .env.local
    environment:
      CONVEX_SELF_HOSTED_URL: http://backend:3210
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${CONVEX_SELF_HOSTED_ADMIN_KEY}
      # Unset cloud deployment so convex dev uses self-hosted (required by CLI)
      CONVEX_DEPLOYMENT: ""
      # Vite reads these from env_file; backend/dashboard need Tailscale URLs in .env.local
    volumes:
      - .:/app
      - /app/node_modules
      # Mount .env.local so app and convex dev can read/write (convex dev may add CONVEX_DEPLOYMENT; remove it if you use self-hosted only)
      - ./.env.local:/app/.env.local
    depends_on:
      backend:
        condition: service_healthy
    command: ["sh", "-c", "chmod +x start.sh && ./start.sh"]

volumes:
  convex_data:
